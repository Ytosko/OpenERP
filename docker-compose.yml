version: '3.8'

# The database is hosted Supabase (auth, RLS, edge functions) — no local
# Postgres/Redis needed. VITE_* values are passed as BUILD args because Vite
# compiles them into the static bundle; runtime env vars have no effect.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_APP_URL=${SERVICE_URL_APP:-https://pos.ytosko.dev}
    restart: unless-stopped
    expose:
      - "80"
