version: '3.8'

services:
  # 1. POS Web Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - VITE_APP_URL=${SERVICE_URL_APP:-https://pos.ytosko.dev}
      - VITE_SUPERADMIN_USER=${SUPERADMIN_USER:-superadmin}
      - VITE_SUPERADMIN_PASS=${SUPERADMIN_PASS:-admin123}
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
    depends_on:
      - db
      - redis
    networks:
      - pos-network

  # 2. PostgreSQL Database with AUTO MIGRATION RUNNER
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_postgres_password_2026}
      POSTGRES_DB: postgres
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d # AUTOMATICALLY EXECUTES ALL MIGRATIONS ON STARTUP
    networks:
      - pos-network

  # 3. Redis Cache
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secure_redis_password_2026}
    volumes:
      - redis_data:/data
    networks:
      - pos-network

volumes:
  postgres_data:
  redis_data:

networks:
  pos-network:
    driver: bridge
