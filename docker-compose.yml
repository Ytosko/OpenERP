version: '3.8'

services:
  # 1. POS Web Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: modular-ai-pos-app:latest
    container_name: pos-app
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_APP_URL=${SERVICE_URL_APP:-https://pos.ytosko.dev}
      - VITE_SUPABASE_URL=${SERVICE_URL_APP:-https://pos.ytosko.dev}
      - VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvcy1lcnAiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTY3MjUxMjAwMCwiZXhwIjoyMDE4MDg4MDAwfQ.placeholder
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - pos-network

  # 2. PostgreSQL Database with AUTO MIGRATION RUNNER
  db:
    image: postgres:15-alpine
    container_name: pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_postgres_password_2026}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d # AUTOMATICALLY EXECUTES ALL MIGRATIONS ON STARTUP
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pos-network

  # 3. Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secure_redis_password_2026}
    volumes:
      - redis_data:/data
    networks:
      - pos-network

volumes:
  postgres_data:
  redis_data:

networks:
  pos-network:
    driver: bridge
